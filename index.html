<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>補助金サポート Canvas</title>

<!-- =============================== -->
<!-- 🌐 CSS：完全統合版 -->
<!-- =============================== -->
<style>

/* =============================== */
/* 🌐 全体レイアウト（ハイエンドUI） */
/* =============================== */
body {
    font-family: "Inter", "Helvetica Neue", "Arial", sans-serif;
    max-width: 880px;
    margin: auto;
    padding: 48px 28px;
    background: #f3f5f8;
    color: #2c3e50;
    line-height: 1.7;
    letter-spacing: 0.2px;
}

/* =============================== */
/* 🏷 タイトル・説明文 */
/* =============================== */
h1 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 34px;
    font-weight: 700;
    color: #1d2735;
}

p {
    text-align: center;
    margin-bottom: 40px;
    color: #6b7785;
    font-size: 15.5px;
}

/* =============================== */
/* 📦 入力フォームカード */
/* =============================== */
form {
    background: #ffffff;
    padding: 36px;
    border-radius: 18px;
    border: 1px solid #e6e9ef;
    box-shadow: 0 12px 32px rgba(0,0,0,0.06);
    transition: box-shadow 0.3s ease;
}

form:hover {
    box-shadow: 0 16px 40px rgba(0,0,0,0.08);
}

/* =============================== */
/* 🪜 ステップ見出し */
/* =============================== */
.step-title {
    font-size: 18px;
    font-weight: 700;
    margin-top: 42px;
    margin-bottom: 14px;
    color: #1f2d3d;
    display: flex;
    align-items: center;
    gap: 10px;
}

.step-title i {
    color: #4a90e2;
    font-size: 22px;
}

/* =============================== */
/* 📌 アコーディオン */
/* =============================== */
.accordion {
    background: #f8fafc;
    border: 1px solid #d9e1ec;
    border-radius: 12px;
    margin-bottom: 14px;
    padding: 16px 20px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    color: #2c3e50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.25s, border-color 0.25s;
}

.accordion:hover {
    background: #eef3f8;
    border-color: #c8d4e3;
}

.accordion .icon i {
    transition: transform 0.25s;
}

.accordion.active .icon i {
    transform: rotate(90deg);
}

/* アコーディオン中身 */
.panel {
    display: none;
    padding: 12px 6px 0 6px;
    animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* =============================== */
/* 📝 ラベル */
/* =============================== */
label {
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
    margin-top: 22px;
    color: #34495e;
    font-size: 15px;
}

/* =============================== */
/* 🧩 例文ボタン */
/* =============================== */
button.example {
    background: #8a97a0;
    color: #fff;
    padding: 6px 14px;
    font-size: 13px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    margin-bottom: 8px;
    transition: background 0.2s, transform 0.15s;
}

button.example:hover {
    background: #6f7a82;
    transform: translateY(-1px);
}

/* =============================== */
/* ✏ テキストエリア */
/* =============================== */
textarea {
    width: 100%;
    min-height: 140px;
    padding: 16px;
    border: 1px solid #cfd6e1;
    border-radius: 12px;
    resize: vertical;
    font-size: 15px;
    background: #fafbfc;
    transition: 0.25s;
}

textarea:focus {
    border-color: #4a90e2;
    background: #fff;
    outline: none;
    box-shadow: 0 0 0 3px rgba(74,144,226,0.18);
}

/* =============================== */
/* 🔘 ボタン（作成・停止） */
/* =============================== */
.button-group {
    margin-top: 20px;
}

button.generate,
button.stop {
    padding: 14px 28px;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: 0.25s;
    font-weight: 600;
}

/* 作成ボタン */
button.generate {
    background: linear-gradient(135deg, #4a90e2, #357ab8);
    color: #fff;
    margin-right: 12px;
    box-shadow: 0 6px 16px rgba(74,144,226,0.35);
}

button.generate:hover {
    background: linear-gradient(135deg, #3f7ecb, #2f6aa3);
    box-shadow: 0 8px 20px rgba(74,144,226,0.45);
    transform: translateY(-1px);
}

/* 停止ボタン */
button.stop {
    background: #d4d7da;
    color: #333;
}

button.stop:hover {
    background: #bfc3c6;
    transform: translateY(-1px);
}

/* =============================== */
/* 📄 結果表示エリア */
/* =============================== */
#result {
    background: #ffffff;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 8px 22px rgba(0,0,0,0.07);
    white-space: pre-wrap;
    font-size: 15.5px;
    line-height: 1.85;
    border: 1px solid #e5e9f2;
    margin-top: 32px;
}

/* =============================== */
/* 📌 モーダル */
/* =============================== */
.modal-overlay {
    display:none
