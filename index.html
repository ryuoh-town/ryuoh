<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>補助金サポート Canvas</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { font-family: sans-serif; line-height: 1.6; }
section { margin-bottom: 20px; }
.panel { display: none; }
.panel.open { display: block; }

.accordion.active .icon i {
    transform: rotate(90deg);
}

.modal-overlay {
    display: none;
}
.modal-overlay.show {
    display: flex;
}

#result {
    white-space: pre-wrap;
    background: #f5f5f5;
    padding: 15px;
    margin-top: 20px;
}
#message {
    color: red;
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>補助金サポート Canvas</h1>
<p>必要事項を入力すると、補助金申請に必要な要項をAIに考えさせる文章ができます。</p>

<form id="form" onsubmit="return false;">

<section>
<div class="step-title">
<i class="fa-solid fa-list-check"></i> Step 1：補助金の種類を選択
</div>

<select id="type">
<option value="jizoku">小規模事業者持続化補助金</option>
<option value="mono">ものづくり補助金（準備中）</option>
<option value="saikouchiku">事業再構築補助金（準備中）</option>
</select>
</section>

<section>
<div class="step-title">
<i class="fa-solid fa-pen-to-square"></i> Step 2：事業者情報の入力
</div>

<button type="button" class="accordion">① 解決したい課題 <span class="icon"><i class="fa-solid fa-chevron-right"></i></span></button>
<div class="panel">
<button type="button" onclick="showExample('problem')">例文</button>
<textarea id="problem"></textarea>
</div>

<button type="button" class="accordion">②-1 いきさつ</button>
<div class="panel">
<button onclick="showExample('history')">例文</button>
<textarea id="history"></textarea>
</div>

<button type="button" class="accordion">③ 申請内容</button>
<div class="panel">
<button onclick="showExample('apply')">例文</button>
<textarea id="apply"></textarea>
</div>

</section>

<section>
<button type="button" onclick="generatePrompt()">作成</button>
<button type="button" onclick="stopGenerate()">停止</button>
</section>

</form>

<div id="message"></div>
<pre id="result"></pre>

<!-- モーダル -->
<div id="exampleModal" class="modal-overlay">
<div class="modal-content">
<p id="exampleText"></p>
<button onclick="insertExample()">挿入</button>
<button onclick="closeExample()">閉じる</button>
</div>
</div>

<div id="afterModal" class="modal-overlay">
<div class="modal-content">
<p>コピーしました</p>
<button onclick="closeAfterModal()">OK</button>
</div>
</div>

<script>
// アコーディオン
document.querySelectorAll(".accordion").forEach(acc => {
    acc.addEventListener("click", () => {
        acc.classList.toggle("active");
        acc.nextElementSibling.classList.toggle("open");
    });
});

// 例文
const examples = {
    problem: "課題の例文",
    history: "いきさつの例文",
    apply: "申請内容の例文"
};

let currentField = null;

function showExample(field) {
    currentField = field;
    document.getElementById("exampleText").textContent = examples[field];
    document.getElementById("exampleModal").classList.add("show");
}

function closeExample() {
    document.getElementById("exampleModal").classList.remove("show");
}

function insertExample() {
    const target = document.getElementById(currentField);
    if (target.value && !confirm("上書きしますか？")) return;
    target.value = examples[currentField];
    closeExample();
}

// 外クリックで閉じる
document.querySelectorAll(".modal-overlay").forEach(modal => {
    modal.addEventListener("click", e => {
        if (e.target === modal) modal.classList.remove("show");
    });
});

// プロンプト生成
function generatePrompt() {
    const problem = document.getElementById("problem").value.trim();
    const apply = document.getElementById("apply").value.trim();

    const msg = document.getElementById("message");
    const result = document.getElementById("result");

    if (!problem || !apply) {
        msg.textContent = "必須項目を入力してください";
        return;
    }

    const prompt = `課題:${problem}\n申請:${apply}`;

    result.textContent = prompt;
    msg.textContent = "コピーしました";

    navigator.clipboard.writeText(prompt).catch(()=>{});

    document.getElementById("afterModal").classList.add("show");
}

// 停止
function stopGenerate() {
    document.getElementById("result").textContent = "";
    document.getElementById("message").textContent = "停止しました";
}

function closeAfterModal() {
    document.getElementById("afterModal").classList.remove("show");
}
</script>

</body>
</html>
