<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>補助金サポート Canvas</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<h1>補助金サポート Canvas</h1>
<p>必要事項を入力すると、補助金申請に必要な要項をAIに考えさせる文章ができます。</p>

<form id="form">

<!-- Step 1 -->
<div class="step-title">
    <i class="fa-solid fa-list-check"></i> Step 1：補助金の種類を選択
</div>

<label>補助金の種類：</label>
<select id="type">
    <option value="jizoku">小規模事業者持続化補助金</option>
    <option value="mono">ものづくり補助金（準備中）</option>
    <option value="saikouchiku">事業再構築補助金（準備中）</option>
</select>

<!-- Step 2 -->
<div class="step-title">
    <i class="fa-solid fa-pen-to-square"></i> Step 2：事業者情報の入力
</div>

<div class="accordion">① 解決したい課題 <i class="fa-solid fa-chevron-right"></i></div>
<div class="panel">
    <button type="button" class="example" onclick="showExample('problem')">例文を見る</button>
    <textarea id="problem"></textarea>
</div>

<div class="accordion">②-1 事業を始めてからのいきさつ <i class="fa-solid fa-chevron-right"></i></div>
<div class="panel">
    <button type="button" class="example" onclick="showExample('history')">例文を見る</button>
    <textarea id="history"></textarea>
</div>

<div class="accordion">②-2 所在地・商圏 <i class="fa-solid fa-chevron-right"></i></div>
<div class="panel">
    <button type="button" class="example" onclick="showExample('location')">例文を見る</button>
    <textarea id="location"></textarea>
</div>

<div class="accordion">②-3 取り扱い商品・サービス <i class="fa-solid fa-chevron-right"></i></div>
<div class="panel">
    <button type="button" class="example" onclick="showExample('products')">例文を見る</button>
    <textarea id="products"></textarea>
</div>

<div class="accordion">②-4 強みと経営課題 <i class="fa-solid fa-chevron-right"></i></div>
<div class="panel">
    <button type="button" class="example" onclick="showExample('strengths')">例文を見る</button>
    <textarea id="strengths"></textarea>
</div>

<div class="accordion">③ 補助金申請したい内容 <i class="fa-solid fa-chevron-right"></i></div>
<div class="panel">
    <button type="button" class="example" onclick="showExample('apply')">例文を見る</button>
    <textarea id="apply"></textarea>
</div>

<!-- Step 3 -->
<div class="step-title">
    <i class="fa-solid fa-wand-magic-sparkles"></i> Step 3：プロンプト生成
</div>

<button type="button" class="generate" onclick="generatePrompt()">作成</button>
<button type="button" class="stop" onclick="stopGenerate()">停止</button>

</form>

<div id="message"></div>
<div id="result"></div>

<!-- =============================== -->
<!-- 📌 例文表示モーダル -->
<!-- =============================== -->
<div id="exampleModal" style="
    display:none; 
    position:fixed; 
    top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.4);
    justify-content:center; align-items:center;
">
    <div style="
        background:white; padding:20px; border-radius:12px;
        width:90%; max-width:500px; box-shadow:0 6px 20px rgba(0,0,0,0.2);
    ">
        <h3>例文</h3>
        <p id="exampleText" style="white-space:pre-wrap; margin-bottom:20px;"></p>

        <button onclick="insertExample()" style="margin-right:10px;">この例文を挿入する</button>
        <button onclick="closeExample()">閉じる</button>
    </div>
</div>

<script>

/* アコーディオン開閉 */
document.addEventListener("DOMContentLoaded", () => {
    const accordions = document.querySelectorAll(".accordion");

    accordions.forEach(acc => {
        acc.addEventListener("click", () => {
            acc.classList.toggle("active");
            const panel = acc.nextElementSibling;
            panel.style.display = panel.style.display === "block" ? "none" : "block";
        });
    });
});

/* 例文データ（あなたが指定した内容をそのまま反映） */
const examples = {
    problem: "私が生産している○○をより、効率的に生産し、多くの方に販売するために△△を導入したい",
    history: "○○年に創業。当社が所在する△△町を中心に、地域密着型のサービスを大事にしてきた。",
    location: "△△町を中心に○○や□□の顧客も抱えている。当社は、交通量の多い主要道路に面しており、顧客からの視認性が高い。また、交通の便もいいため、遠方の顧客先であってもスムーズな移動ができる",
    products: "売上は○○を中心としており、売上割合は○○が●％、△△が●％、□□が●％となっている。",
    strengths:
`強み
・地域密着型事業者として信頼が高い
・多様な商品を取り扱っているので、多様な注文に対応できる

弱み
・当社の商圏の事業者が減少傾向にあり、販路拡大が求められている
・商品は当社で生産しているが、生産場所の面積が限られており、最大活用しないといけない
・創業から使用している機械では、現在の注文に対応できていない
・DX化が滞っており、すべての機械に人がつかないといけないので、生産性が低い`,
    apply: "○○を効率的に生産するため、オートメーション化された△△を導入する。"
};

let currentField = null;

/* 例文をモーダルで表示 */
function showExample(field) {
    currentField = field;
    document.getElementById("exampleText").textContent = examples[field];
    document.getElementById("exampleModal").style.display = "flex";
}

/* モーダル閉じる */
function closeExample() {
    document.getElementById("exampleModal").style.display = "none";
}

/* 例文を挿入（ユーザーが選択） */
function insertExample() {
    if (currentField) {
        document.getElementById(currentField).value = examples[currentField];
    }
    closeExample();
}

/* 持続化補助金テンプレート（完全版） */
function getJizokuTemplate(problem, history, location, products, strengths, apply) {
return `
あなたは補助金申請の専門家であり、補助金審査員の視点を理解した中小企業診断士です。
以下の素材をもとに、小規模事業者持続化補助金の審査項目に完全準拠した事業計画書文章を生成してください。

【事業者が入力した素材】
① 解決したい課題：
${problem}

② あなたの事業について：
・事業を始めてからのいきさつ：
${history}

・所在地（立地条件や商圏など）：
${location}

・取り扱い商品・サービス：
${products}

・強みと経営課題：
${strengths}

③ 補助金申請をしたいもの（具体的に）：
${apply}

---

# 審査項目に基づく生成指示（重要）

【1. 自社の経営状況分析の妥当性】
・事業者が入力した素材をもとに、自社の経営状況を適切に把握していること  
・自社の製品・サービス、強み・弱みを論理的に整理すること  

【2. 経営方針・目標と今後のプランの適切性】
・自社の強み・弱みを踏まえた経営方針・目標を設定すること  
・対象とする市場（商圏）や顧客ニーズを踏まえた今後のプランを提示すること  

【3. 補助事業計画の有効性】
・補助事業の内容が具体的で、実現可能性が高いこと  
・販路開拓のために必要かつ有効である理由を明確に示すこと  
・補助事業が経営方針・目標の達成にどのように寄与するかを説明すること  

文章は「結論 → 理由 → 補足」の順で構成し、  
見出し・箇条書きを適切に用いて、審査員が読みやすい構成にしてください。

また、売上増加率・客数増加・作業時間削減など、  
必ず数値を含めて記述してください。

---

# 生成してほしい内容（12要件）

1. 市場の動向  
2. 顧客ニーズ  
3. 自社の強み  
4. 自社の弱み  
5. 経営方針・目標（数値を含む）  
6. 今後の事業展開  
7. 補助事業で行う事業名（30文字以内）  
8. 事業の概要（30文字以内）  
9. 背景・目的  
10. 具体的な取組（30文字以内）  
11. 具体的な取組内容の詳細（数値を含めて）  
12. 取組の効果・効果の試算（数値を含む、結びの言葉も生成）
`;
}

/* プロンプト生成 */
function generatePrompt() {
    const problem   = document.getElementById("problem").value;
    const history   = document.getElementById("history").value;
    const location  = document.getElementById("location").value;
    const products  = document.getElementById("products").value;
    const strengths = document.getElementById("strengths").value;
    const apply     = document.getElementById("apply").value;
    const type      = document.getElementById("type").value;

    let prompt = "";

    if (type === "jizoku") {
        prompt = getJizokuTemplate(problem, history, location, products, strengths, apply);
    } else {
        prompt = "この補助金テンプレートは現在準備中です。";
    }

    document.getElementById("result").textContent = prompt;

    const msg = document.getElementById("message");
    msg.style.display = "block";
    msg.textContent = "プロンプトをコピーしました。上部の Copilot タブに移動し、貼り付けて実行してください。";

    navigator.clipboard.writeText(prompt);
}

/* 停止 */
function stopGenerate() {
    document.getElementById("result").textContent = "生成を停止しました。";
    document.getElementById("message").style.display = "none";
}

</script>

</body>
</html>
